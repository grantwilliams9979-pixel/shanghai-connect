<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shanghai Connect | Coming Soon</title>
    <meta
      name="description"
      content="Shanghai Connect is being refined. A polished bilingual Shanghai starter experience is coming soon."
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0e7c7b" />
    <style>
      :root {
        --ink: #263238;
        --paper: #fffdf8;
        --green: #0e7c7b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--paper);
      }

      .stage {
        position: relative;
        min-height: 100svh;
        display: grid;
        align-items: end;
        overflow: hidden;
        isolation: isolate;
      }

      .stage-image,
      .stage-scrim {
        position: absolute;
        inset: 0;
        z-index: -2;
      }

      .stage-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .stage-scrim {
        z-index: -1;
        background:
          linear-gradient(0deg, rgba(9, 14, 17, 0.86) 0%, rgba(9, 14, 17, 0.35) 46%, rgba(9, 14, 17, 0.12) 68%, rgba(9, 14, 17, 0.35) 100%);
      }

      .brand {
        position: absolute;
        top: clamp(20px, 4vw, 40px);
        left: clamp(20px, 4vw, 56px);
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: white;
        text-decoration: none;
        z-index: 1;
      }

      .brand-mark {
        display: block;
        width: 38px;
        height: 38px;
        flex-shrink: 0;
        border-radius: 50%;
        background: var(--paper);
      }

      .brand strong {
        display: block;
        font-size: 15px;
      }

      .brand small {
        display: block;
        margin-top: 1px;
        font-size: 12px;
        opacity: 0.72;
      }

      .content {
        width: min(700px, 100%);
        padding: 0 clamp(20px, 5vw, 72px) clamp(56px, 8vw, 96px);
        color: white;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.4rem, 6vw, 4.4rem);
        line-height: 1.02;
        letter-spacing: -0.01em;
      }

      p {
        margin: 0;
        max-width: 52ch;
        font-size: clamp(1rem, 2vw, 1.15rem);
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.86);
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        margin-top: 28px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        padding-bottom: 2px;
        transition: color 150ms ease, border-color 150ms ease;
      }

      .home-link:hover {
        color: white;
        border-color: white;
      }
    </style>
      <link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/assets/brand/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/assets/brand/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="shortcut icon" href="/assets/brand/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/brand/site.webmanifest" />
    <meta name="theme-color" content="#0b6362" />
  </head>
  <body>
    <main class="stage" aria-labelledby="coming-soon-title">
      <img
        class="stage-image"
        src="assets/img/homepage-hero/shanghai-s-skyline-stands-tall-at-dusk--_klbOmCI05I.jpg"
        alt="The Oriental Pearl Tower and Lujiazui skyline at dusk in Shanghai"
      />
      <div class="stage-scrim" aria-hidden="true"></div>

      <a class="brand" href="/index.html" aria-label="Shanghai Connect home">
        <img class="brand-mark" src="/assets/brand/favicon.svg" alt="" width="38" height="38" />
        <span>
          <strong>Shanghai Connect</strong>
          <small>上海指南</small>
        </span>
      </a>

      <div class="content">
        <h1 id="coming-soon-title">Shanghai Connect is almost here.</h1>
        <p>
          We're refining a bilingual starter guide to help newcomers arrive, settle in, and live confidently in Shanghai. Launching soon.
        </p>
        <a class="home-link" href="/index.html">Preview the current build →</a>
      </div>
    </main>
  </body>
</html>
